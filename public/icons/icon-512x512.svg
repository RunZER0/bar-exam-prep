<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1a1a"/>
  <g transform="translate(256,240)">
    <!-- Graduation cap top -->
    <polygon points="0,-110 -140,-50 0,-20 140,-50" fill="#ffffff" />
    <!-- Cap center button -->
    <circle cx="0" cy="-50" r="12" fill="#1a1a1a" />
    <!-- Tassel string -->
    <line x1="0" y1="-50" x2="-100" y2="-30" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
    <!-- Tassel end -->
    <circle cx="-105" cy="-28" r="10" fill="#22c55e" />
    <line x1="-105" y1="-18" x2="-105" y2="12" stroke="#22c55e" stroke-width="5" stroke-linecap="round" />
    <!-- Cap base / band -->
    <path d="M-100,-20 Q0,30 100,-20" stroke="#ffffff" stroke-width="8" fill="none" />
    <!-- Small book underneath -->
    <rect x="-35" y="50" width="70" height="50" rx="6" fill="#ffffff" opacity="0.9" />
    <line x1="0" y1="52" x2="0" y2="98" stroke="#1a1a1a" stroke-width="3" />
    <line x1="-25" y1="65" x2="-8" y2="65" stroke="#1a1a1a" stroke-width="2" opacity="0.4" />
    <line x1="-25" y1="75" x2="-8" y2="75" stroke="#1a1a1a" stroke-width="2" opacity="0.4" />
    <line x1="8" y1="65" x2="25" y2="65" stroke="#1a1a1a" stroke-width="2" opacity="0.4" />
    <line x1="8" y1="75" x2="25" y2="75" stroke="#1a1a1a" stroke-width="2" opacity="0.4" />
  </g>
</svg>
</svg>
